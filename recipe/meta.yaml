{% set name = "napari-sam4is" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 5695e55b06d114f089695192d6934f2dc24cebd3b91620f46151c1cbd643871b


build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - magicgui
    - napari
    - numpy
    - python >={{ python_min }}
    - pytorch
    - qtpy
    - pyyaml
    - scikit-image
    - segment-anything
    - torchvision
    - requests
    - urllib3
    - Pillow
    - platformdirs

test:
  imports:
    - napari_sam4is
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - pyqt
    - python {{ python_min }}

about:
  home: https://pypi.org/project/napari-SAM4IS
  summary: Create annotations for instance segmentation using Segment Anything models
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/hiroalchem/napari-SAM4IS

extra:
  recipe-maintainers:
    - goanpeca
    - hiroalchem
    - jaimergp
